<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Masuk Ujian</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  background:
  linear-gradient(
    135deg,
    #0f172a,
    #2563eb
  );
}

.card{

  width:90%;
  max-width:400px;

  background:
  rgba(255,255,255,0.12);

  backdrop-filter:blur(10px);

  padding:30px;

  border-radius:20px;

  text-align:center;

  color:white;
}

select,input,button{

  width:100%;

  padding:15px;

  border:none;

  border-radius:10px;

  margin-top:15px;

  font-size:18px;
}

input{

  text-align:center;

  text-transform:uppercase;

  font-weight:bold;

  letter-spacing:3px;
}

button{

  background:#22c55e;

  color:white;

  font-weight:bold;

  cursor:pointer;
}

.message{

  margin-top:20px;

  min-height:25px;
}

</style>
</head>
<body>

<div class="card">

<h2>MASUK UJIAN</h2>

<select id="mapel">

<option value="PABP">PABP</option>
<option value="MTK">Matematika</option>
<option value="IPA">IPA</option>
<option value="IPS">IPS</option>

</select>

<input
type="text"
id="kode"
maxlength="8"
placeholder="MASUKKAN TOKEN">

<button onclick="cekToken()">
MULAI UJIAN
</button>

<div class="message"
id="message">
</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxTSVfytJugI6QsAXD0lCU8uBwHyZ94XSWGwCU8cLPEElgH1onECcm4lun_eQL9pa-rdA/exec";

async function cekToken(){

  const kode =
    document.getElementById("kode")
    .value
    .trim()
    .toUpperCase();

  const mapel =
    document.getElementById("mapel")
    .value;

  const message =
    document.getElementById("message");

  if(kode === ""){

    message.innerHTML =
      "Token wajib diisi";

    return;
  }

  message.innerHTML =
    "Memeriksa token...";

  try{

    const response =
      await fetch(

        API_URL +

        "?kode=" +

        encodeURIComponent(kode)

        + "&mapel=" +

        encodeURIComponent(mapel)

      );

    const data =
      await response.json();

    if(data.status){

      message.innerHTML =
        "Token benar";

      setTimeout(()=>{

        window.location.href =
          data.url;

      },1000);

    }

    else{

      message.innerHTML =
        "Token salah";

    }

  }

  catch(error){

    message.innerHTML =
      "Server error";

  }
}

</script>

</body>
</html>
